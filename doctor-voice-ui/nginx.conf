server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This line tells Nginx: if you can't find /login on the disk, 
        # just serve index.html anyway and let React handle it!
        try_files $uri $uri/ /index.html;
    }
    # Add this next to your other location blocks (like /auth/ or /conversations)
    location /webrtc/ {
        proxy_pass http://voice_gateway:8000; # Use your backend's exact service name
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering so media descriptions stream instantly
        proxy_buffering off;
    }
}